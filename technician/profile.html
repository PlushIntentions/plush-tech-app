<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technician Profile</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: url('/bg/dashboard-blur.jpg') center/cover no-repeat fixed;
      color: white;
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      backdrop-filter: blur(12px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 90px;
      background: rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 25px;
      gap: 25px;
      backdrop-filter: blur(20px);
    }

    .sidebar-icon {
      width: 38px;
      cursor: pointer;
      transition: 0.3s ease;
      animation: pulseGlow 3s infinite ease-in-out;
    }

    /* Wave timing */
    .sidebar-icon:nth-child(1) { animation-delay: 0s; }
    .sidebar-icon:nth-child(2) { animation-delay: 0.2s; }
    .sidebar-icon:nth-child(3) { animation-delay: 0.4s; }
    .sidebar-icon:nth-child(4) { animation-delay: 0.6s; }
    .sidebar-icon:nth-child(5) { animation-delay: 0.8s; }
    .sidebar-icon:nth-child(6) { animation-delay: 1s; }
    .sidebar-icon:nth-child(7) { animation-delay: 1.2s; }
    .sidebar-icon:nth-child(8) { animation-delay: 1.4s; }

    @keyframes pulseGlow {
      0% {
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.4))
                drop-shadow(0 0 12px rgba(255,180,160,0.3));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255,255,255,0.7))
                drop-shadow(0 0 25px rgba(255,180,160,0.5));
        transform: scale(1.08);
      }
      100% {
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.4))
                drop-shadow(0 0 12px rgba(255,180,160,0.3));
        transform: scale(1);
      }
    }

    /* MAIN CONTENT */
    .content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .glass-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      padding: 30px;
      backdrop-filter: blur(15px);
      margin-bottom: 25px;
      box-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    label {
      display: block;
      margin-top: 20px;
      margin-bottom: 6px;
      color: #E8A7C8;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: white;
      font-size: 14px;
      backdrop-filter: blur(10px);
    }

    button {
      margin-top: 30px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #E8A7C8, #F5C15C);
      color: #0F0F0F;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .profile-photo {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.4);
      margin-bottom: 20px;
    }

    @media(max-width:900px){
      .sidebar { width: 70px; }
      .content { padding: 20px; }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <img src="/icons/home.png" class="sidebar-icon">
    <img src="/icons/dashboard.png" class="sidebar-icon">
    <img src="/icons/technician.png" class="sidebar-icon">
    <img src="/icons/clients.png" class="sidebar-icon">
    <img src="/icons/jobs.png" class="sidebar-icon">
    <img src="/icons/billing.png" class="sidebar-icon">
    <img src="/icons/settings.png" class="sidebar-icon">
    <img src="/icons/logout.png" class="sidebar-icon">
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Your Profile</h1>
      <p style="opacity:0.7;">Update your technician information</p>
    </div>

    <div class="glass-card">

      <center>
        <img id="profilePhotoPreview" class="profile-photo" src="/default-profile.png">
      </center>

      <form id="profileForm">

        <label>Full Name</label>
        <input id="full_name">

        <label>Short Bio</label>
        <textarea id="bio" rows="4"></textarea>

        <label>Tagline</label>
        <input id="tagline">

        <label>Hourly Rate ($)</label>
        <input id="hourly_rate" type="number">

        <label>Service Radius (miles)</label>
        <input id="service_radius" type="number">

        <label>Profile Photo</label>
        <input id="profile_photo" type="file" accept="image/*">

        <button type="submit">Save Profile</button>

      </form>

    </div>

  </div>
</div>

<script>
  const supabaseClient = supabase.createClient(
    "YOUR_URL",
    "YOUR_KEY"
  );

  async function loadProfile() {
    const techId = localStorage.getItem("tech_id");

    const { data, error } = await supabaseClient
      .from("technicians")
      .select("*")
      .eq("id", techId)
      .single();

    if (error) return console.error(error);

    document.getElementById("full_name").value = data.full_name || "";
    document.getElementById("bio").value = data.bio || "";
    document.getElementById("tagline").value = data.tagline || "";
    document.getElementById("hourly_rate").value = data.hourly_rate || "";
    document.getElementById("service_radius").value = data.service_radius || "";

    if (data.profile_photo_url) {
      document.getElementById("profilePhotoPreview").src = data.profile_photo_url;
    }
  }

  async function uploadPhoto(file, techId) {
    if (!file) return null;

    const ext = file.name.split(".").pop();
    const path = `profile_photos/${techId}.${ext}`;

    const { error } = await supabaseClient.storage
      .from("technician_docs")
      .upload(path, file, { upsert: true });

    if (error) return null;

    const { data } = supabaseClient.storage
      .from("technician_docs")
      .getPublicUrl(path);

    return data.publicUrl;
  }

  document.getElementById("profileForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const techId = localStorage.getItem("tech_id");

    const fullName = document.getElementById("full_name").value;
    const bio = document.getElementById("bio").value;
    const tagline = document.getElementById("tagline").value;
    const hourlyRate = parseFloat(document.getElementById("hourly_rate").value);
    const radius = parseFloat(document.getElementById("service_radius").value);
    const photoFile = document.getElementById("profile_photo").files[0];

    const photoUrl = await uploadPhoto(photoFile, techId);

    const { error } = await supabaseClient
      .from("technicians")
      .update({
        full_name: fullName,
        bio: bio,
        tagline: tagline,
        hourly_rate: hourlyRate,
        service_radius: radius,
        profile_photo_url: photoUrl
      })
      .eq("id", techId);

    if (error) {
      alert("Something went wrong saving your profile.");
      return;
    }

    alert("Profile updated successfully.");
    loadProfile();
  });

  loadProfile();
</script>

</body>
</html>
