<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technician Dashboard</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Mapbox -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: url('/bg/dashboard-blur.jpg') center/cover no-repeat fixed;
      color: white;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 90px;
      background: rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 25px;
      gap: 25px;
      backdrop-filter: blur(20px);
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 10;
    }

    .sidebar-icon {
      width: 38px;
      cursor: pointer;
      transition: 0.3s ease;
      animation: pulseGlow 3s infinite ease-in-out;
    }

    @keyframes pulseGlow {
      0% { filter: drop-shadow(0 0 6px rgba(255,255,255,0.4)); transform: scale(1); }
      50% { filter: drop-shadow(0 0 12px rgba(255,255,255,0.7)); transform: scale(1.08); }
      100% { filter: drop-shadow(0 0 6px rgba(255,255,255,0.4)); transform: scale(1); }
    }

    /* PANEL CONTAINER */
    .panel-container {
      display: flex;
      flex-direction: row;
      overflow-x: scroll;
      overflow-y: hidden;
      scroll-behavior: smooth;
      width: calc(100vw - 90px);
      height: 100vh;
      margin-left: 90px;
      scroll-snap-type: none;
      -webkit-overflow-scrolling: touch;
    }

    /* PANELS */
    .panel {
      min-width: calc(100vw - 90px);
      height: 100vh;
      overflow-y: auto;
      padding: 40px;
      backdrop-filter: blur(15px);
    }

    /* GLASS CARDS */
    .glass-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      padding: 30px;
      margin-bottom: 25px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    /* JOB ITEM */
    .job-item {
      display: flex;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .job-btn {
      padding: 10px 18px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .job-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    /* MAP */
    #map {
      width: 100%;
      height: 500px;
      border-radius: 18px;
      margin-top: 20px;
    }

    .marker {
      width: 22px;
      height: 22px;
      background: #F5C15C;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 12px rgba(245,193,92,0.6);
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <img src="/icons/dashboard.png" class="sidebar-icon" onclick="goToPanel(0)">
  <img src="/icons/jobs.png" class="sidebar-icon" onclick="goToPanel(1)">
  <img src="/icons/technician.png" class="sidebar-icon" onclick="goToPanel(2)">
  <img src="/icons/clients.png" class="sidebar-icon" onclick="goToPanel(3)">
  <img src="/icons/billing.png" class="sidebar-icon" onclick="goToPanel(4)">
  <img src="/icons/map.png" class="sidebar-icon" onclick="goToPanel(5)">
</div>

<!-- PANELS -->
<div class="panel-container" id="panelContainer">

  <!-- DASHBOARD -->
  <section class="panel" id="panel-dashboard">
    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Dashboard Overview</h1>
      <p style="opacity:0.7;">Your technician performance summary</p>
    </div>
    <div id="dashboardStats"></div>
  </section>

  <!-- AVAILABLE JOBS -->
  <section class="panel" id="panel-available">
    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Available Jobs</h1>
    </div>
    <div id="availableJobs"></div>
  </section>

  <!-- ASSIGNED JOBS -->
  <section class="panel" id="panel-assigned">
    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Assigned Jobs</h1>
    </div>
    <div id="assignedJobs"></div>
  </section>

  <!-- REQUESTED JOBS -->
  <section class="panel" id="panel-requested">
    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Requested Jobs</h1>
    </div>
    <div id="requestedJobs"></div>
  </section>

  <!-- COMPLETED JOBS -->
  <section class="panel" id="panel-completed">
    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Completed Jobs</h1>
    </div>
    <div id="completedJobs"></div>
  </section>

  <!-- MAP -->
  <section class="panel" id="panel-map">
    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Service Map</h1>
    </div>
    <div id="map"></div>
  </section>

</div>

<script>
  /* MAPBOX */
  mapboxgl.accessToken = "YOUR_MAPBOX_KEY";

  const supabaseClient = supabase.createClient(
    "YOUR_SUPABASE_URL",
    "YOUR_SUPABASE_KEY"
  );

  /* SIDEBAR NAVIGATION */
  function goToPanel(index) {
    const width = window.innerWidth - 90;
    document.getElementById("panelContainer").scrollTo({
      left: width * index,
      behavior: "smooth"
    });
  }

  /* SWIPE NAVIGATION */
  const panelContainer = document.getElementById("panelContainer");
  let startX = 0;

  panelContainer.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  });

  panelContainer.addEventListener("touchmove", e => {
    const diff = startX - e.touches[0].clientX;
    panelContainer.scrollLeft += diff * 0.5;
  });

  /* LOAD JOBS */
  async function loadJobs() {
    const techId = localStorage.getItem("tech_id");

    const categories = [
      { id: "availableJobs", filter: { status: "open" } },
      { id: "assignedJobs", filter: { assigned_to: techId, status: "in_progress" } },
      { id: "requestedJobs", filter: { status: "requested" } },
      { id: "completedJobs", filter: { status: "completed" } }
    ];

    for (const cat of categories) {
      let query = supabaseClient.from("jobs").select("*");

      Object.keys(cat.filter).forEach(key => {
        query = query.eq(key, cat.filter[key]);
      });

      const { data } = await query;
      const container = document.getElementById(cat.id);

      data.forEach(job => {
        const div = document.createElement("div");
        div.className = "glass-card job-item";
        div.innerHTML = `
          <div>
            <h3>${job.title}</h3>
            <p style="opacity:0.6;">${job.city}, ${job.state}</p>
          </div>
          <button class="job-btn">View</button>
        `;
        container.appendChild(div);
      });
    }
  }

  /* MAPBOX INIT */
  function initMap() {
    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/dark-v11",
      center: [-83.8088, 39.9242],
      zoom: 10
    });

    loadMapPins(map);
  }

  async function loadMapPins(map) {
    const { data } = await supabaseClient.from("jobs").select("*");

    data.forEach(job => {
      const el = document.createElement("div");
      el.className = "marker";

      el.onclick = () => goToPanel(1);

      new mapboxgl.Marker(el)
        .setLngLat([job.lng, job.lat])
        .addTo(map);
    });
  }

  loadJobs();
  initMap();
</script>

</body>
</html>
