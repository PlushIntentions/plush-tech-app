<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Available Jobs – Technician</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: url('/bg/dashboard-blur.jpg') center/cover no-repeat fixed;
      color: white;
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
      backdrop-filter: blur(12px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 90px;
      background: rgba(255,255,255,0.08);
      border-right: 1px solid rgba(255,255,255,0.15);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 25px;
      gap: 25px;
      backdrop-filter: blur(20px);
    }

    .sidebar-icon {
      width: 38px;
      cursor: pointer;
      transition: 0.3s ease;
      animation: pulseGlow 3s infinite ease-in-out;
    }

    /* Wave timing */
    .sidebar-icon:nth-child(1) { animation-delay: 0s; }
    .sidebar-icon:nth-child(2) { animation-delay: 0.2s; }
    .sidebar-icon:nth-child(3) { animation-delay: 0.4s; }
    .sidebar-icon:nth-child(4) { animation-delay: 0.6s; }
    .sidebar-icon:nth-child(5) { animation-delay: 0.8s; }
    .sidebar-icon:nth-child(6) { animation-delay: 1s; }
    .sidebar-icon:nth-child(7) { animation-delay: 1.2s; }
    .sidebar-icon:nth-child(8) { animation-delay: 1.4s; }

    @keyframes pulseGlow {
      0% {
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.4))
                drop-shadow(0 0 12px rgba(255,180,160,0.3));
        transform: scale(1);
      }
      50% {
        filter: drop-shadow(0 0 12px rgba(255,255,255,0.7))
                drop-shadow(0 0 25px rgba(255,180,160,0.5));
        transform: scale(1.08);
      }
      100% {
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.4))
                drop-shadow(0 0 12px rgba(255,180,160,0.3));
        transform: scale(1);
      }
    }

    /* MAIN CONTENT */
    .content {
      flex: 1;
      padding: 40px;
      overflow-y: auto;
    }

    .glass-card {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      padding: 30px;
      backdrop-filter: blur(15px);
      margin-bottom: 25px;
      box-shadow: 0 0 25px rgba(255,255,255,0.08);
    }

    .job-item {
      display: flex;
      justify-content: space-between;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    .job-title {
      font-size: 18px;
      font-weight: 600;
    }

    .job-meta {
      opacity: 0.6;
      font-size: 14px;
    }

    .job-btn {
      padding: 10px 18px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .job-btn:hover {
      background: rgba(255,255,255,0.25);
    }

    @media(max-width:900px){
      .sidebar { width: 70px; }
      .content { padding: 20px; }
    }
  </style>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <img src="/icons/home.png" class="sidebar-icon">
    <img src="/icons/dashboard.png" class="sidebar-icon">
    <img src="/icons/technician.png" class="sidebar-icon">
    <img src="/icons/clients.png" class="sidebar-icon">
    <img src="/icons/jobs.png" class="sidebar-icon">
    <img src="/icons/billing.png" class="sidebar-icon">
    <img src="/icons/settings.png" class="sidebar-icon">
    <img src="/icons/logout.png" class="sidebar-icon">
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <div class="glass-card">
      <h1 style="font-family:'Playfair Display', serif;">Available Jobs</h1>
      <p style="opacity:0.7;">Browse and accept new service requests in your area</p>
    </div>

    <div id="jobsList" class="glass-card">
      <h2 style="font-family:'Playfair Display', serif;">Jobs Near You</h2>

      <!-- Jobs will be injected here by JS -->
    </div>

  </div>
</div>

<script>
  const supabaseClient = supabase.createClient(
    "YOUR_URL",
    "YOUR_KEY"
  );

  async function loadJobs() {
    const { data, error } = await supabaseClient
      .from("jobs")
      .select("*")
      .eq("status", "open");

    if (error) {
      console.error(error);
      return;
    }

    const container = document.getElementById("jobsList");

    data.forEach(job => {
      const div = document.createElement("div");
      div.className = "job-item";

      div.innerHTML = `
        <div>
          <h3 class="job-title">${job.title}</h3>
          <p class="job-meta">${job.city}, ${job.state} • ${job.distance} miles away</p>
        </div>
        <button class="job-btn" onclick="viewJob(${job.id})">View</button>
      `;

      container.appendChild(div);
    });
  }

  function viewJob(id) {
    window.location.href = "/technician/job-details.html?id=" + id;
  }

  loadJobs();
</script>

</body>
</html>
