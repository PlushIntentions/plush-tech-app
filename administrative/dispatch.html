<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dispatch Console</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.1.2/mapbox-gl.js"></script>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0f0f0f;
  color: white;
  padding: 40px;
}

h1 {
  font-size: 32px;
  margin-bottom: 20px;
}

.glass {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 16px;
  padding: 25px;
  margin-bottom: 25px;
  backdrop-filter: blur(12px);
}

#map {
  width: 100%;
  height: 600px;
  border-radius: 16px;
  margin-top: 20px;
}

.tech-card {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
  cursor: pointer;
}

.status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 8px;
}

.status-available { background: #4CAF50; }
.status-busy { background: #F5C15C; }
.status-offline { background: #ff4d4d; }

button {
  padding: 8px 14px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.btn-dispatch {
  background: #F5C15C;
  color: #0f0f0f;
}

.modal {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: rgba(255,255,255,0.1);
  padding: 30px;
  border-radius: 16px;
  width: 450px;
  backdrop-filter: blur(15px);
}

select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
}
</style>
</head>

<body>

<h1>Admin Dispatch Console</h1>

<div class="glass">
  <h2>Technicians</h2>
  <div id="techList"></div>
</div>

<div class="glass">
  <h2>Live Dispatch Map</h2>
  <div id="map"></div>
</div>

<!-- DISPATCH MODAL -->
<div class="modal" id="dispatchModal">
  <div class="modal-content">
    <h2>Dispatch Technician</h2>

    <p id="modalTech"></p>
    <p id="modalJob"></p>

    <label>Dispatch Notes</label>
    <textarea id="dispatchNotes" placeholder="Optional notes..."></textarea>

    <button class="btn-dispatch" onclick="confirmDispatch()">Dispatch</button>
    <button onclick="closeModal()" style="margin-top:10px;background:rgba(255,255,255,0.2);color:white;">Cancel</button>
  </div>
</div>

<script>
mapboxgl.accessToken = "YOUR_MAPBOX_KEY";

const supabaseClient = supabase.createClient(
  "YOUR_SUPABASE_URL",
  "YOUR_SUPABASE_KEY"
);

let technicians = [];
let jobs = [];
let map;
let techMarkers = [];
let jobMarkers = [];
let selectedTech = null;
let selectedJob = null;

/* INIT MAP */
function initMap() {
  map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/mapbox/dark-v11",
    center: [-98.5795, 39.8283],
    zoom: 4
  });
}

/* LOAD TECHNICIANS */
async function loadTechnicians() {
  const { data } = await supabaseClient
    .from("technicians")
    .select("*");

  technicians = data;
  renderTechList();
  renderTechMarkers();
}

/* LOAD JOBS */
async function loadJobs() {
  const { data } = await supabaseClient
    .from("jobs")
    .select("*")
    .in("status", ["open", "assigned", "scheduled", "in_progress"]);

  jobs = data;
  renderJobMarkers();
}

/* RENDER TECH LIST */
function renderTechList() {
  const list = document.getElementById("techList");
  list.innerHTML = "";

  technicians.forEach(t => {
    const statusClass =
      t.status === "available" ? "status-available" :
      t.status === "busy" ? "status-busy" :
      "status-offline";

    const card = document.createElement("div");
    card.className = "tech-card";
    card.onclick = () => selectTech(t);

    card.innerHTML = `
      <span class="status-dot ${statusClass}"></span>
      <strong>${t.name}</strong><br>
      <small>${t.status.toUpperCase()}</small>
    `;

    list.appendChild(card);
  });
}

/* SELECT TECH */
function selectTech(tech) {
  selectedTech = tech;
  alert("Technician selected: " + tech.name + ". Now click a job marker on the map.");
}

/* RENDER TECH MARKERS */
function renderTechMarkers() {
  techMarkers.forEach(m => m.remove());
  techMarkers = [];

  technicians.forEach(t => {
    if (!t.lat || !t.lng) return;

    const marker = new mapboxgl.Marker({ color: "#4CAF50" })
      .setLngLat([t.lng, t.lat])
      .setPopup(new mapboxgl.Popup().setHTML(`<strong>${t.name}</strong><br>${t.status}`))
      .addTo(map);

    techMarkers.push(marker);
  });
}

/* RENDER JOB MARKERS */
function renderJobMarkers() {
  jobMarkers.forEach(m => m.remove());
  jobMarkers = [];

  jobs.forEach(j => {
    if (!j.lat || !j.lng) return;

    const marker = new mapboxgl.Marker({ color: "#F5C15C" })
      .setLngLat([j.lng, j.lat])
      .setPopup(new mapboxgl.Popup().setHTML(`<strong>${j.title}</strong><br>Status: ${j.status}`))
      .addTo(map);

    marker.getElement().onclick = () => openDispatchModal(j);

    jobMarkers.push(marker);
  });
}

/* OPEN DISPATCH MODAL */
function openDispatchModal(job) {
  if (!selectedTech) {
    alert("Select a technician first.");
    return;
  }

  selectedJob = job;

  document.getElementById("modalTech").innerText = "Technician: " + selectedTech.name;
  document.getElementById("modalJob").innerText = "Job: " + job.title;

  document.getElementById("dispatchModal").style.display = "flex";
}

/* CLOSE MODAL */
function closeModal() {
  document.getElementById("dispatchModal").style.display = "none";
}

/* CONFIRM DISPATCH */
async function confirmDispatch() {
  const notes = document.getElementById("dispatchNotes").value;

  await supabaseClient
    .from("jobs")
    .update({
      assigned_to: selectedTech.id,
      status: "assigned",
      admin_notes: notes,
      approval_time: new Date().toISOString()
    })
    .eq("id", selectedJob.id);

  await supabaseClient.from("job_notifications").insert({
    job_id: selectedJob.id,
    tech_id: selectedTech.id,
    type: "dispatched",
    created_at: new Date().toISOString()
  });

  fetch("/api/notify-dispatch", {
    method: "POST",
    body: JSON.stringify({
      jobId: selectedJob.id,
      techId: selectedTech.id,
      notes
    })
  });

  alert("Technician dispatched successfully.");

  closeModal();
  loadJobs();
}

/* REALTIME UPDATES */
supabaseClient
  .channel("dispatch_feed")
  .on("postgres_changes", { event: "UPDATE", schema: "public", table: "jobs" }, payload => {
    loadJobs();
  })
  .subscribe();

supabaseClient
  .channel("tech_location_feed")
  .on("postgres_changes", { event: "UPDATE", schema: "public", table: "technicians" }, payload => {
    loadTechnicians();
  })
  .subscribe();

initMap();
loadTechnicians();
loadJobs();
</script>

</body>
</html>
